<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Weather Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Serif+Display&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1923;
    color: #e8edf2;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: #e8edf2;
    letter-spacing: -0.5px;
  }

  header p {
    color: #7a9bb5;
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 300;
  }

  #last-updated {
    color: #4a7a9b;
    font-size: 0.78rem;
    margin-top: 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: #162535;
    border: 1px solid #1e3448;
    border-radius: 16px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: #2a5070;
  }

  .card.primary {
    border-color: #2a6496;
    background: #162d45;
  }

  .card.primary::before {
    content: 'HOME';
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #4a9fd4;
    background: rgba(74, 159, 212, 0.12);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .city-name {
    font-size: 1.15rem;
    font-weight: 600;
    color: #c8dae8;
    margin-bottom: 2px;
  }

  .state-name {
    font-size: 0.78rem;
    color: #4a7a9b;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 20px;
  }

  .temp-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 12px;
  }

  .temp-main {
    font-family: 'DM Serif Display', serif;
    font-size: 3.2rem;
    color: #e8edf2;
    line-height: 1;
  }

  .temp-unit {
    font-size: 1.1rem;
    color: #7a9bb5;
    margin-bottom: 8px;
  }

  .condition {
    font-size: 0.9rem;
    color: #a0bdd0;
    margin-bottom: 16px;
    font-weight: 400;
  }

  .weather-icon {
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-top: 1px solid #1e3448;
    padding-top: 16px;
    margin-top: 4px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .detail-label {
    font-size: 0.7rem;
    color: #4a7a9b;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  .detail-value {
    font-size: 0.92rem;
    color: #a0bdd0;
    font-weight: 400;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    gap: 10px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #1e3448;
    border-top-color: #4a9fd4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { color: #4a7a9b; font-size: 0.82rem; }

  .error {
    color: #c0392b;
    font-size: 0.82rem;
    padding: 12px 0;
  }

  .refresh-btn {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: 1px solid #2a5070;
    color: #4a9fd4;
    padding: 10px 28px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .refresh-btn:hover { background: rgba(74, 159, 212, 0.08); }

  /* Compact mobile layout */
  @media (max-width: 640px) {
    body { padding: 20px 14px; }

    header { margin-bottom: 24px; }
    header h1 { font-size: 1.6rem; }
    header p { font-size: 0.78rem; }

    .grid { gap: 10px; }

    .card {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "icon city"
        "icon state"
        "icon temp"
        "icon condition"
        "details details";
      column-gap: 14px;
      row-gap: 0;
      padding: 14px 16px;
      border-radius: 12px;
    }

    .card:hover { transform: none; }

    .card.primary::before {
      top: 10px;
      right: 12px;
      font-size: 0.6rem;
      padding: 2px 7px;
    }

    .weather-icon {
      grid-area: icon;
      font-size: 1.9rem;
      align-self: center;
      margin-bottom: 0;
    }

    .city-name { grid-area: city; font-size: 1rem; margin-bottom: 0; }
    .state-name { grid-area: state; font-size: 0.66rem; margin-bottom: 2px; }

    .temp-row { grid-area: temp; gap: 6px; margin-bottom: 2px; }
    .temp-main { font-size: 1.8rem; }
    .temp-unit { font-size: 0.8rem; margin-bottom: 2px; }

    .condition { grid-area: condition; font-size: 0.78rem; margin-bottom: 0; }

    .details {
      grid-area: details;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      border-top: 1px solid #1e3448;
      padding-top: 10px;
      margin-top: 10px;
    }

    .detail-label { font-size: 0.56rem; }
    .detail-value { font-size: 0.78rem; }

    .refresh-btn { margin-top: 24px; padding: 9px 22px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>My Weather Dashboard</h1>
  <p>Current conditions across your locations</p>
  <div id="last-updated"></div>
</header>

<div class="grid" id="grid"></div>
<button class="refresh-btn" onclick="loadAll()">↻ Refresh Weather</button>

<script>
const locations = [
  { city: "Gilbert",   state: "Arizona",  lat: 33.3528, lon: -111.7890, primary: true  },
  { city: "Dubuque",   state: "Iowa",     lat: 42.5006, lon: -90.6646,  primary: false },
  { city: "Galena",    state: "Illinois", lat: 42.4161, lon: -90.4290,  primary: false },
  { city: "Goodyear",  state: "Arizona",  lat: 33.4353, lon: -112.3576, primary: false },
  { city: "Portland",  state: "Oregon",   lat: 45.5051, lon: -122.6750, primary: false },
  { city: "Roselle",   state: "Illinois", lat: 41.9839, lon: -88.0837,  primary: false },
];

const weatherCodes = {
  0:  { label: "Clear Sky",          icon: "☀️" },
  1:  { label: "Mostly Clear",       icon: "🌤️" },
  2:  { label: "Partly Cloudy",      icon: "⛅" },
  3:  { label: "Overcast",           icon: "☁️" },
  45: { label: "Foggy",              icon: "🌫️" },
  48: { label: "Icy Fog",            icon: "🌫️" },
  51: { label: "Light Drizzle",      icon: "🌦️" },
  53: { label: "Drizzle",            icon: "🌦️" },
  55: { label: "Heavy Drizzle",      icon: "🌧️" },
  61: { label: "Light Rain",         icon: "🌧️" },
  63: { label: "Rain",               icon: "🌧️" },
  65: { label: "Heavy Rain",         icon: "🌧️" },
  71: { label: "Light Snow",         icon: "🌨️" },
  73: { label: "Snow",               icon: "❄️" },
  75: { label: "Heavy Snow",         icon: "❄️" },
  80: { label: "Rain Showers",       icon: "🌦️" },
  81: { label: "Rain Showers",       icon: "🌧️" },
  82: { label: "Heavy Showers",      icon: "⛈️" },
  85: { label: "Snow Showers",       icon: "🌨️" },
  95: { label: "Thunderstorm",       icon: "⛈️" },
  96: { label: "Thunderstorm + Hail",icon: "⛈️" },
  99: { label: "Thunderstorm + Hail",icon: "⛈️" },
};

function getWeatherInfo(code) {
  return weatherCodes[code] || { label: "Unknown", icon: "🌡️" };
}

function cToF(c) {
  return Math.round(c * 9 / 5 + 32);
}

function kmhToMph(k) {
  return Math.round(k * 0.621371);
}

function renderLoading(loc) {
  return `
    <div class="card ${loc.primary ? 'primary' : ''}">
      <div class="city-name">${loc.city}</div>
      <div class="state-name">${loc.state}</div>
      <div class="loading">
        <div class="spinner"></div>
        <p>Fetching weather…</p>
      </div>
    </div>`;
}

function renderCard(loc, data) {
  const c = data.current;
  const info = getWeatherInfo(c.weather_code);
  const tempF = cToF(c.temperature_2m);
  const feelsF = cToF(c.apparent_temperature);
  const windMph = kmhToMph(c.wind_speed_10m);
  const humidity = c.relative_humidity_2m;
  const precip = Math.round(c.precipitation * 100) / 100;

  return `
    <div class="card ${loc.primary ? 'primary' : ''}">
      <div class="city-name">${loc.city}</div>
      <div class="state-name">${loc.state}</div>
      <div class="weather-icon">${info.icon}</div>
      <div class="temp-row">
        <span class="temp-main">${tempF}</span>
        <span class="temp-unit">°F</span>
      </div>
      <div class="condition">${info.label}</div>
      <div class="details">
        <div class="detail-item">
          <span class="detail-label">Feels Like</span>
          <span class="detail-value">${feelsF}°F</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Humidity</span>
          <span class="detail-value">${humidity}%</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Wind</span>
          <span class="detail-value">${windMph} mph</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Precipitation</span>
          <span class="detail-value">${precip} in</span>
        </div>
      </div>
    </div>`;
}

function renderError(loc) {
  return `
    <div class="card ${loc.primary ? 'primary' : ''}">
      <div class="city-name">${loc.city}</div>
      <div class="state-name">${loc.state}</div>
      <div class="error">⚠️ Could not load weather. Check your internet connection and refresh.</div>
    </div>`;
}

async function fetchWeather(loc) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m&temperature_unit=celsius&wind_speed_unit=kmh&precipitation_unit=inch`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Network response was not ok');
  return res.json();
}

async function loadAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = locations.map(renderLoading).join('');
  document.getElementById('last-updated').textContent = '';

  const cards = Array.from(grid.children);

  await Promise.all(locations.map(async (loc, i) => {
    try {
      const data = await fetchWeather(loc);
      cards[i].outerHTML;
      cards[i].insertAdjacentHTML('afterend', renderCard(loc, data));
      cards[i].remove();
    } catch (e) {
      cards[i].insertAdjacentHTML('afterend', renderError(loc));
      cards[i].remove();
    }
  }));

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `Last updated: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
}

loadAll();
</script>
</body>
</html>
